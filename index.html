<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园失物招领</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="apple-touch-icon" href="assets/icon-192x192.png">
    <meta name="theme-color" content="#4CAF50">
    <meta name="description" content="校园失物招领平台 - 帮助师生找回失物">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-container">
                <h1 class="logo">校园失物招领</h1>
                <div class="nav-links">
                    <a href="#home" class="nav-link active">首页</a>
                    <a href="#publish" class="nav-link">发布</a>
                    <a href="#search" class="nav-link">搜索</a>
                    <a href="#profile" class="nav-link">我的</a>
                </div>
                <button class="menu-toggle" id="menuToggle">☰</button>
            </div>
        </nav>

        <!-- 主内容区域 -->
        <main class="main-content">
            <!-- 首页 -->
            <section id="home" class="page active">
                <div class="hero-section">
                    <h2>欢迎使用校园失物招领平台</h2>
                    <p>帮助师生快速找回失物，共建和谐校园</p>
                    <div class="action-buttons">
                        <button class="btn-primary" onclick="showPage('publish')">发布信息</button>
                        <button class="btn-secondary" onclick="showPage('search')">查找物品</button>
                    </div>
                </div>

                <div class="recent-items">
                    <h3>最新发布</h3>
                    <div id="recentItemsList" class="items-grid">
                        <!-- 动态加载最新物品 -->
                    </div>
                </div>
            </section>

            <!-- 发布页面 -->
            <section id="publish" class="page">
                <div class="publish-form">
                    <h2>发布失物/招领信息</h2>
                    <form id="publishForm">
                        <div class="form-group">
                            <label>类型</label>
                            <div class="radio-group">
                                <label><input type="radio" name="type" value="lost" checked> 寻物启事</label>
                                <label><input type="radio" name="type" value="found"> 招领启事</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="itemName">物品名称</label>
                            <input type="text" id="itemName" name="itemName" required>
                        </div>

                        <div class="form-group">
                            <label for="category">物品分类</label>
                            <select id="category" name="category" required>
                                <option value="">请选择分类</option>
                                <option value="证件">证件</option>
                                <option value="书本">书本</option>
                                <option value="电子产品">电子产品</option>
                                <option value="衣物">衣物</option>
                                <option value="钥匙">钥匙</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="location">丢失/捡到地点</label>
                            <input type="text" id="location" name="location" required>
                        </div>

                        <div class="form-group">
                            <label for="time">时间</label>
                            <input type="datetime-local" id="time" name="time" required>
                        </div>

                        <div class="form-group">
                            <label for="description">详细描述</label>
                            <textarea id="description" name="description" rows="4"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="contact">联系方式</label>
                            <input type="text" id="contact" name="contact" required>
                        </div>

                        <div class="form-group">
                            <label for="image">上传图片</label>
                            <input type="file" id="image" name="image" accept="image/*">
                            <div id="imagePreview" class="image-preview"></div>
                        </div>

                        <button type="submit" class="btn-primary">发布信息</button>
                    </form>
                </div>
            </section>

            <!-- 搜索页面 -->
            <section id="search" class="page">
                <div class="search-section">
                    <h2>查找物品</h2>
                    <div class="search-filters">
                        <input type="text" id="searchInput" placeholder="输入关键词搜索...">
                        <select id="categoryFilter">
                            <option value="">全部分类</option>
                            <option value="证件">证件</option>
                            <option value="书本">书本</option>
                            <option value="电子产品">电子产品</option>
                            <option value="衣物">衣物</option>
                            <option value="钥匙">钥匙</option>
                            <option value="其他">其他</option>
                        </select>
                        <select id="typeFilter">
                            <option value="">全部类型</option>
                            <option value="lost">寻物启事</option>
                            <option value="found">招领启事</option>
                        </select>
                        <button onclick="searchItems()" class="btn-primary">搜索</button>
                    </div>

                    <div id="searchResults" class="items-grid">
                        <!-- 搜索结果 -->
                    </div>
                </div>
            </section>

            <!-- 个人中心 -->
            <section id="profile" class="page">
                <div class="profile-section">
                    <h2>我的信息</h2>
                    <div class="user-info">
                        <div class="info-item">
                            <span>用户名:</span>
                            <span id="userName">游客</span>
                        </div>
                        <div class="info-item">
                            <span>发布数量:</span>
                            <span id="postCount">0</span>
                        </div>
                    </div>

                    <div class="my-posts">
                        <h3>我的发布</h3>
                        <div id="myPostsList" class="items-grid">
                            <!-- 我的发布列表 -->
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- 底部信息 -->
        <footer class="footer">
            <p>&copy; 2026 校园失物招领平台</p>
        </footer>
    </div>

    <!-- 详情模态框 -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/pwa.js"></script>
</body>
</html>
