<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单测试 - 022340614</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        button {
            padding: 10px 20px;
            margin: 10px 5px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        #chart-container {
            width: 100%;
            height: 400px;
            margin: 20px 0;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <h1>简单功能测试 - 022340614数据可视化平台</h1>
    
    <div id="test-results">
        <h2>测试结果:</h2>
        <div id="test1" class="test-result">测试1: JavaScript环境... <span>运行中</span></div>
        <div id="test2" class="test-result">测试2: Plotly.js加载... <span>运行中</span></div>
        <div id="test3" class="test-result">测试3: 数据文件加载... <span>运行中</span></div>
        <div id="test4" class="test-result">测试4: 图表渲染... <span>运行中</span></div>
        <div id="test5" class="test-result">测试5: 按钮功能... <span>运行中</span></div>
    </div>
    
    <div id="chart-container"></div>
    
    <div>
        <h3>功能测试:</h3>
        <button onclick="testChart()">测试图表渲染</button>
        <button onclick="testData()">测试数据加载</button>
        <button onclick="testButtons()">测试按钮功能</button>
        <button onclick="openMainPage()">打开主页面</button>
    </div>
    
    <div id="console-output" style="margin-top: 20px; padding: 10px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 5px;">
        <h4>控制台输出:</h4>
        <pre id="console-log"></pre>
    </div>

    <script src="https://cdn.plot.ly/plotly-2.16.1.min.js"></script>
    <script>
        // 捕获控制台输出
        const originalConsoleLog = console.log;
        const originalConsoleError = console.error;
        const consoleLog = document.getElementById('console-log');
        
        function updateConsole(type, args) {
            const message = Array.from(args).join(' ');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.textContent = `[${timestamp}] ${type}: ${message}`;
            consoleLog.appendChild(logEntry);
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }
        
        console.log = function(...args) {
            updateConsole('LOG', args);
            originalConsoleLog.apply(console, args);
        };
        
        console.error = function(...args) {
            updateConsole('ERROR', args);
            originalConsoleError.apply(console, args);
        };
        
        // 测试1: JavaScript环境
        function testJavaScript() {
            const test1 = document.getElementById('test1');
            if (typeof window !== 'undefined' && typeof document !== 'undefined') {
                test1.className = 'test-result success';
                test1.innerHTML = '测试1: JavaScript环境... <span>✅ 通过</span>';
                return true;
            } else {
                test1.className = 'test-result error';
                test1.innerHTML = '测试1: JavaScript环境... <span>❌ 失败</span>';
                return false;
            }
        }
        
        // 测试2: Plotly.js加载
        function testPlotly() {
            const test2 = document.getElementById('test2');
            if (typeof Plotly !== 'undefined') {
                test2.className = 'test-result success';
                test2.innerHTML = '测试2: Plotly.js加载... <span>✅ 通过</span>';
                return true;
            } else {
                test2.className = 'test-result error';
                test2.innerHTML = '测试2: Plotly.js加载... <span>❌ 失败</span>';
                return false;
            }
        }
        
        // 测试3: 数据文件加载
        async function testDataLoading() {
            const test3 = document.getElementById('test3');
            try {
                const response = await fetch('chapter5_data.json');
                if (response.ok) {
                    const data = await response.json();
                    test3.className = 'test-result success';
                    test3.innerHTML = `测试3: 数据文件加载... <span>✅ 通过 (${Object.keys(data).length}个数据集)</span>`;
                    return data;
                } else {
                    test3.className = 'test-result error';
                    test3.innerHTML = `测试3: 数据文件加载... <span>❌ 失败 (HTTP ${response.status})</span>`;
                    return null;
                }
            } catch (error) {
                test3.className = 'test-result error';
                test3.innerHTML = `测试3: 数据文件加载... <span>❌ 失败 (${error.message})</span>`;
                return null;
            }
        }
        
        // 测试4: 图表渲染
        function testChartRendering() {
            const test4 = document.getElementById('test4');
            if (!testPlotly()) {
                test4.className = 'test-result error';
                test4.innerHTML = '测试4: 图表渲染... <span>❌ 失败 (Plotly.js未加载)</span>';
                return false;
            }
            
            try {
                const testData = [{
                    x: [1, 2, 3, 4, 5],
                    y: [10, 15, 13, 17, 20],
                    type: 'scatter',
                    mode: 'lines+markers',
                    name: '测试数据'
                }];
                
                const layout = {
                    title: '测试图表 - 022340614',
                    xaxis: {title: 'X轴'},
                    yaxis: {title: 'Y轴'}
                };
                
                Plotly.newPlot('chart-container', testData, layout);
                test4.className = 'test-result success';
                test4.innerHTML = '测试4: 图表渲染... <span>✅ 通过</span>';
                return true;
            } catch (error) {
                test4.className = 'test-result error';
                test4.innerHTML = `测试4: 图表渲染... <span>❌ 失败 (${error.message})</span>`;
                return false;
            }
        }
        
        // 测试5: 按钮功能
        function testButtonFunctionality() {
            const test5 = document.getElementById('test5');
            try {
                // 创建测试按钮
                const testButton = document.createElement('button');
                testButton.textContent = '测试按钮';
                let clicked = false;
                testButton.onclick = function() {
                    clicked = true;
                    console.log('测试按钮被点击');
                };
                
                // 模拟点击
                testButton.click();
                
                // 检查是否可点击
                if (testButton.disabled === false) {
                    test5.className = 'test-result success';
                    test5.innerHTML = '测试5: 按钮功能... <span>✅ 通过</span>';
                    return true;
                } else {
                    test5.className = 'test-result error';
                    test5.innerHTML = '测试5: 按钮功能... <span>❌ 失败 (按钮被禁用)</span>';
                    return false;
                }
            } catch (error) {
                test5.className = 'test-result error';
                test5.innerHTML = `测试5: 按钮功能... <span>❌ 失败 (${error.message})</span>`;
                return false;
            }
        }
        
        // 运行所有测试
        async function runAllTests() {
            console.log('开始运行所有测试...');
            
            // 测试1
            testJavaScript();
            
            // 测试2
            testPlotly();
            
            // 测试3
            await testDataLoading();
            
            // 测试4
            testChartRendering();
            
            // 测试5
            testButtonFunctionality();
            
            console.log('所有测试完成');
        }
        
        // 手动测试函数
        function testChart() {
            console.log('手动测试图表渲染...');
            testChartRendering();
        }
        
        function testData() {
            console.log('手动测试数据加载...');
            testDataLoading().then(data => {
                if (data) {
                    console.log('数据加载成功:', data);
                }
            });
        }
        
        function testButtons() {
            console.log('手动测试按钮功能...');
            testButtonFunctionality();
        }
        
        function openMainPage() {
            console.log('打开主页面...');
            window.open('index.html', '_blank');
        }
        
        // 页面加载时运行测试
        window.addEventListener('load', function() {
            console.log('页面加载完成，开始自动测试...');
            setTimeout(runAllTests, 1000);
        });
    </script>
</body>
</html>
