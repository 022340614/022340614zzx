<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面 - 022340614</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .success {
            color: green;
            font-weight: bold;
        }
        .error {
            color: red;
            font-weight: bold;
        }
        button {
            padding: 10px 20px;
            margin: 10px 5px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>功能测试页面 - 022340614</h1>
    
    <div class="test-section">
        <h2>测试1: JavaScript加载</h2>
        <div id="test1">
            <p>状态: <span id="js-status">测试中...</span></p>
        </div>
    </div>
    
    <div class="test-section">
        <h2>测试2: Plotly.js加载</h2>
        <div id="test2">
            <p>状态: <span id="plotly-status">测试中...</span></p>
        </div>
    </div>
    
    <div class="test-section">
        <h2>测试3: 数据文件加载</h2>
        <div id="test3">
            <p>状态: <span id="data-status">测试中...</span></p>
            <button onclick="testLocalData()">测试本地数据文件</button>
            <button onclick="testGitHubData()">测试GitHub数据</button>
            <div id="data-result"></div>
        </div>
    </div>
    
    <div class="test-section">
        <h2>测试4: 图表渲染</h2>
        <div id="test4">
            <p>状态: <span id="chart-status">测试中...</span></p>
            <div id="test-chart" style="width: 100%; height: 300px;"></div>
            <button onclick="testChartRender()">测试图表渲染</button>
        </div>
    </div>
    
    <div class="test-section">
        <h2>测试5: 控制台错误</h2>
        <div id="test5">
            <p>控制台错误: <span id="console-errors">无</span></p>
            <button onclick="checkConsoleErrors()">检查控制台错误</button>
        </div>
    </div>
    
    <div class="test-section">
        <h2>修复建议</h2>
        <div id="suggestions">
            <p id="suggestion-text">等待测试结果...</p>
        </div>
    </div>

    <script src="https://cdn.plot.ly/plotly-2.16.1.min.js"></script>
    <script>
        // 捕获控制台错误
        const originalConsoleError = console.error;
        const errors = [];
        
        console.error = function(...args) {
            errors.push(args.join(' '));
            originalConsoleError.apply(console, args);
        };
        
        // 测试1: JavaScript加载
        document.getElementById('js-status').textContent = '✅ JavaScript已加载';
        document.getElementById('js-status').className = 'success';
        
        // 测试2: Plotly.js加载
        function testPlotly() {
            if (typeof Plotly !== 'undefined') {
                document.getElementById('plotly-status').textContent = '✅ Plotly.js已加载';
                document.getElementById('plotly-status').className = 'success';
                return true;
            } else {
                document.getElementById('plotly-status').textContent = '❌ Plotly.js加载失败';
                document.getElementById('plotly-status').className = 'error';
                return false;
            }
        }
        
        // 测试3: 数据文件加载
        async function testLocalData() {
            try {
                const response = await fetch('chapter5_data.json');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('data-result').innerHTML = 
                        `<p class="success">✅ 本地数据文件加载成功</p>
                         <pre>${JSON.stringify(data, null, 2).substring(0, 200)}...</pre>`;
                    return data;
                } else {
                    document.getElementById('data-result').innerHTML = 
                        `<p class="error">❌ 本地数据文件加载失败: ${response.status}</p>`;
                    return null;
                }
            } catch (error) {
                document.getElementById('data-result').innerHTML = 
                    `<p class="error">❌ 本地数据文件加载错误: ${error.message}</p>`;
                return null;
            }
        }
        
        async function testGitHubData() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/022340614/022340614zzx/main/chapter5_data.json');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('data-result').innerHTML = 
                        `<p class="success">✅ GitHub数据加载成功</p>
                         <pre>${JSON.stringify(data, null, 2).substring(0, 200)}...</pre>`;
                    return data;
                } else {
                    document.getElementById('data-result').innerHTML = 
                        `<p class="error">❌ GitHub数据加载失败: ${response.status}</p>`;
                    return null;
                }
            } catch (error) {
                document.getElementById('data-result').innerHTML = 
                    `<p class="error">❌ GitHub数据加载错误: ${error.message}</p>`;
                return null;
            }
        }
        
        // 测试4: 图表渲染
        function testChartRender() {
            if (!testPlotly()) {
                document.getElementById('chart-status').textContent = '❌ Plotly.js未加载，无法测试图表';
                document.getElementById('chart-status').className = 'error';
                return;
            }
            
            try {
                const testData = [{
                    x: [1, 2, 3, 4, 5],
                    y: [10, 15, 13, 17, 20],
                    type: 'scatter'
                }];
                
                const layout = {
                    title: '测试图表 - 022340614',
                    xaxis: {title: 'X轴'},
                    yaxis: {title: 'Y轴'}
                };
                
                Plotly.newPlot('test-chart', testData, layout);
                document.getElementById('chart-status').textContent = '✅ 图表渲染成功';
                document.getElementById('chart-status').className = 'success';
            } catch (error) {
                document.getElementById('chart-status').textContent = `❌ 图表渲染失败: ${error.message}`;
                document.getElementById('chart-status').className = 'error';
            }
        }
        
        // 测试5: 控制台错误
        function checkConsoleErrors() {
            if (errors.length === 0) {
                document.getElementById('console-errors').textContent = '✅ 无控制台错误';
                document.getElementById('console-errors').className = 'success';
            } else {
                document.getElementById('console-errors').textContent = `❌ 发现 ${errors.length} 个错误`;
                document.getElementById('console-errors').className = 'error';
                console.log('所有错误:', errors);
            }
        }
        
        // 提供修复建议
        function provideSuggestions() {
            const suggestions = [];
            
            if (typeof Plotly === 'undefined') {
                suggestions.push('1. Plotly.js加载失败，请检查网络连接或使用本地Plotly.js文件');
            }
            
            if (errors.length > 0) {
                suggestions.push('2. 发现JavaScript错误，请检查控制台查看详细信息');
            }
            
            if (suggestions.length === 0) {
                suggestions.push('所有测试通过！如果主页面仍有问题，请检查浏览器控制台获取更多信息');
            }
            
            document.getElementById('suggestion-text').innerHTML = suggestions.map(s => `<p>${s}</p>`).join('');
        }
        
        // 页面加载时运行测试
        window.addEventListener('load', function() {
            // 延迟执行测试，确保所有资源加载完成
            setTimeout(() => {
                testPlotly();
                testLocalData();
                checkConsoleErrors();
                provideSuggestions();
            }, 1000);
        });
    </script>
</body>
</html>
